---
# Grafana version — matches the previous stub_grafana default
grafana_version: "12.*"

# Repo management is handled automatically by the collection
grafana_manage_repo: true

# Service state
grafana_service_state: started
grafana_service_enabled: true

# OpenNMS Horizon connection — override these per environment as needed
onms_hzn_base_url: http://localhost:8980
onms_hzn_rest_url: "{{ onms_hzn_base_url }}/opennms"

# PostgreSQL datasource credentials — move to vault for production
opennms_datasource_db_host: localhost
opennms_datasource_db_port: 5432
opennms_datasource_db_name: opennms_horizon
opennms_datasource_db_user: opennms
opennms_datasource_db_password: p4a55word!  # TODO: move to vault

# OpenNMS Grafana app plugin
grafana_plugins:
  - opennms-opennms-app

# App provisioning — enables the OpenNMS app in the Main Org
grafana_app_conf:
  - name: opennms-opennms-app
    org_name: Main Org.
    enabled: true

# Datasources — translated from stub_grafana templates/datasources/opennms-horizon.yml.j2
grafana_datasources:
  - name: OpenNMS Performance
    type: opennms-performance-datasource
    access: proxy
    url: "{{ onms_hzn_rest_url }}/"
    isDefault: true
    basicAuth: true
    basicAuthUser: admin
    secureJsonData:
      basicAuthPassword: admin

  - name: OpenNMS Entity
    type: opennms-entity-datasource
    access: proxy
    url: "{{ onms_hzn_rest_url }}/"
    basicAuth: true
    basicAuthUser: admin
    secureJsonData:
      basicAuthPassword: admin

  - name: OpenNMS Flow
    type: opennms-flow-datasource
    access: proxy
    url: "{{ onms_hzn_rest_url }}/"
    basicAuth: true
    basicAuthUser: admin
    secureJsonData:
      basicAuthPassword: admin

  - name: postgres
    type: postgres
    access: proxy
    url: "{{ opennms_datasource_db_host }}:{{ opennms_datasource_db_port }}"
    database: "{{ opennms_datasource_db_name }}"
    user: "{{ opennms_datasource_db_user }}"
    secureJsonData:
      password: "{{ opennms_datasource_db_password }}"
    jsonData:
      postgresVersion: 1200
      sslmode: disable
      tlsAuth: false
      tlsSkipVerify: true
