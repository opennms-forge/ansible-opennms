# Elasticsearch flow persistence
#
# Flow data can be persisted by Core (single-node) OR by one or more Sentinels.
# Enable it on exactly ONE of the two roles - never both.
#
# Core or Sentinel handles flow persistence
#   Set in group_vars for the Core host group or the Sentinel host group to handle flow persistence.
#
#   opennms_elastic_flows:
#     elasticUrl: http://elasticsearch-host:9200
#     globalElasticUser: elastic
#     globalElasticPassword: changeme
#     elasticIndexStrategy: monthly
#     maxFlowDurationMs: 120000
#     bulkSize: 1000
#     bulkRetryCount: 5
#     bulkFlushMs: 500
#     connTimeout: 5000
#     readTimeout: 30000
#     skipElasticsearchPersistence: "false"
#     useComposableTemplates: "false"

