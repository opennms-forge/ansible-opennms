  # org.opennms.netmgt.jetty.https-keystorepassword: changeit
  # org.opennms.netmgt.jetty.https-keypassword: changeit
  # org.opennms.netmgt.jetty.https-host: 127.0.0.1
  # org.opennms.netmgt.jetty.https-port: 8443
